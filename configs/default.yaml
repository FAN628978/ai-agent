runtime:
  max_iterations: 20
  default_mode: act
  stream_events: true

model:
  provider: openai-compatible
  base_url: http://localhost:8500
  chat: MiniMax-M2.5
  planner: MiniMax-M2.5
  executor: MiniMax-M2.5
  reflector: MiniMax-M2.5
  api_key:
  timeout_s: 30
  max_tokens: 1024
  temperature: 0.2
  chat_history_limit: 20
  chat_system_prompt: 你是一个在本地 CLI 中运行的 AI 助手。请用简洁、直接、实用的中文回答用户。

context:
  max_tokens: 180000
  memory_budget: 12000
  rag_budget: 40000
  history_budget: 30000
  tool_result_budget: 25000

permissions:
  default_shell: deny
  workspace_write: allow
  network: deny
  destructive_commands: deny

memory:
  enabled: false
  auto_write: false
